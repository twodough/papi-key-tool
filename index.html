<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papi Key Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body {
            font-family: 'Space+Mono', monospace;
            background-color: #f0f0f0;
            color: #111;
        }
        .app-container {
            max-width: 650px;
            width: 100%;
            background: #fff;
            border: 1px solid #000;
        }
        .header {
            padding: 1.5rem;
            border-bottom: 1px solid #000;
        }
        .section {
            padding: 2rem;
        }
        .section:not(:last-child) {
            border-bottom: 1px solid #eee;
        }
        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.05em; }
        h2 { font-size: 0.875rem; font-weight: 700; text-transform: uppercase; margin-bottom: 1rem; color: #666; }
        
        textarea, input {
            width: 100%;
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 0.75rem;
            font-size: 0.75rem;
            font-family: 'Space+Mono', monospace;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus, input:focus {
            border-color: #000;
            background: #fff;
        }
        
        button {
            width: 100%;
            background: #000;
            color: #fff;
            padding: 0.75rem;
            font-weight: 700;
            font-size: 0.875rem;
            text-transform: uppercase;
            transition: opacity 0.2s;
            margin-top: 0.5rem;
        }
        button:hover { opacity: 0.8; }
        button:active { transform: translateY(1px); }

        .key-label {
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 1rem;
            display: block;
            text-transform: uppercase;
        }
        .private-label { color: #e11d48; }
        
        .result-box {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border: 1px solid #000;
            background: #fafafa;
            text-align: center;
        }
        #result-text { font-size: 1.25rem; font-weight: 700; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="app-container">
        <div class="header">
            <h1>PAPI KEY TOOL</h1>
        </div>

        <div class="section">
            <h2>01 / GENERATE KEYS</h2>
            <button onclick="generateKeys()">Generate New Keys</button>
            
            <div id="key-display" class="hidden">
                <label class="key-label">Public Key (Share this)</label>
                <textarea id="pub-key" readonly rows="3" onclick="this.select()"></textarea>
                
                <label class="key-label private-label">Private Key (Keep this secret)</label>
                <textarea id="priv-key" readonly rows="3" onclick="this.select()"></textarea>
            </div>
        </div>

        <div class="section">
            <h2>02 / DECRYPT IDENTITY</h2>
            <div class="space-y-4">
                <textarea id="input-priv-key" placeholder="Paste your Private Key" rows="2"></textarea>
                <textarea id="encrypted-msg" placeholder="Paste encrypted message" rows="2"></textarea>
                <button onclick="decryptMessage()">Reveal Identity</button>
            </div>
            
            <div id="result-display" class="hidden result-box">
                <div id="result-text"></div>
            </div>
        </div>
    </div>

    <footer class="mt-6 text-[10px] text-gray-400 uppercase tracking-widest">
        twodough / papi-key-tool
    </footer>

    <script>
        // Use JWK components directly to keep strings short
        // We only need 'n' and 'e' for public, and 'n', 'e', 'd', 'p', 'q', 'dp', 'dq', 'qi' for private
        
        async function generateKeys() {
            const keyPair = await window.crypto.subtle.generateKey(
                {
                    name: "RSA-OAEP",
                    modulusLength: 1024, // Reduced to 1024 for shorter strings (safe enough for game)
                    publicExponent: new Uint8Array([1, 0, 1]),
                    hash: "SHA-256",
                },
                true,
                ["encrypt", "decrypt"]
            );

            const pubJwk = await window.crypto.subtle.exportKey("jwk", keyPair.publicKey);
            const privJwk = await window.crypto.subtle.exportKey("jwk", keyPair.privateKey);

            // Shorthand: only store essential fields
            const pubShort = { n: pubJwk.n, e: pubJwk.e };
            const privShort = { 
                n: privJwk.n, e: privJwk.e, d: privJwk.d, 
                p: privJwk.p, q: privJwk.q, dp: privJwk.dp, 
                dq: privJwk.dq, qi: privJwk.qi 
            };

            document.getElementById('pub-key').value = btoa(JSON.stringify(pubShort));
            document.getElementById('priv-key').value = btoa(JSON.stringify(privShort));
            document.getElementById('key-display').classList.remove('hidden');
        }

        async function decryptMessage() {
            try {
                const privRaw = document.getElementById('input-priv-key').value.trim();
                const cipherRaw = document.getElementById('encrypted-msg').value.trim();
                if (!privRaw || !cipherRaw) return;

                const privData = JSON.parse(atob(privRaw));
                
                // Reconstruct full JWK
                const privJwk = {
                    ...privData,
                    kty: "RSA",
                    alg: "RSA-OAEP-256",
                    ext: true,
                    key_ops: ["decrypt"]
                };

                const cipherBytes = new Uint8Array(atob(cipherRaw).split("").map(c => c.charCodeAt(0)));

                const privKey = await window.crypto.subtle.importKey(
                    "jwk",
                    privJwk,
                    { name: "RSA-OAEP", hash: "SHA-256" },
                    false,
                    ["decrypt"]
                );

                const decrypted = await window.crypto.subtle.decrypt(
                    { name: "RSA-OAEP" },
                    privKey,
                    cipherBytes
                );

                const text = new TextDecoder().decode(decrypted);
                const display = document.getElementById('result-display');
                const textEl = document.getElementById('result-text');
                
                display.classList.remove('hidden');
                textEl.innerText = text;
            } catch (e) {
                console.error(e);
                alert('Invalid Key or Message');
            }
        }
    </script>
</body>
</html>
