<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>怕屁遊戲加密工具 🎭</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .hidden-tab { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10 px-4">

    <div class="max-w-xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-600 text-white py-6 px-8 text-center">
            <h1 class="text-2xl font-bold">怕屁遊戲加密工具 🎭</h1>
            <p class="text-blue-100 mt-2">只有你自己能解開自己的秘密</p>
        </div>

        <!-- Tabs -->
        <div class="flex border-b">
            <button onclick="showTab('player')" id="btn-player" class="flex-1 py-4 font-medium tab-active">玩家分頁</button>
            <button onclick="showTab('host')" id="btn-host" class="flex-1 py-4 font-medium text-gray-500 hover:text-blue-500">主持人分頁</button>
        </div>

        <!-- Player Tab -->
        <div id="tab-player" class="p-8 space-y-8">
            <!-- Part 1: Generate -->
            <section class="space-y-4">
                <h2 class="text-lg font-semibold text-gray-800 flex items-center">
                    <span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-full inline-flex items-center justify-center mr-2">1</span>
                    準備階段：產生 Key
                </h2>
                <div class="flex space-x-2">
                    <input id="player-name" type="text" placeholder="輸入你的名字" class="flex-1 border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none">
                    <button onclick="generateKeys()" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition">產生 Key</button>
                </div>
                <div id="key-display" class="hidden space-y-4">
                    <div>
                        <label class="text-sm font-medium text-gray-600">你的公鑰 (貼到群組)</label>
                        <div class="relative">
                            <textarea id="pub-key" readonly class="w-full h-24 text-xs font-mono bg-gray-50 border rounded-lg p-3 mt-1"></textarea>
                            <button onclick="copy('pub-key')" class="absolute top-2 right-2 bg-white border shadow-sm px-2 py-1 text-xs rounded hover:bg-gray-100">複製</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-sm font-medium text-red-600 font-bold">你的私鑰 (❌ 絕對不要給別人看)</label>
                        <div class="relative">
                            <textarea id="priv-key" readonly class="w-full h-24 text-xs font-mono bg-red-50 border border-red-100 rounded-lg p-3 mt-1"></textarea>
                            <button onclick="copy('priv-key')" class="absolute top-2 right-2 bg-white border shadow-sm px-2 py-1 text-xs rounded hover:bg-gray-100">複製</button>
                        </div>
                        <p class="text-xs text-red-500 mt-1 italic">※ 請截圖或複製存好，重新整理網頁就會消失。</p>
                    </div>
                </div>
            </section>

            <hr>

            <!-- Part 2: Decrypt -->
            <section class="space-y-4">
                <h2 class="text-lg font-semibold text-gray-800 flex items-center">
                    <span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-full inline-flex items-center justify-center mr-2">2</span>
                    解密階段：我是誰？
                </h2>
                <div class="space-y-3">
                    <textarea id="input-priv-key" placeholder="貼上你的私鑰" class="w-full h-20 text-xs font-mono border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-400"></textarea>
                    <textarea id="encrypted-msg" placeholder="貼上主持人在群組給你的加密訊息" class="w-full h-20 text-xs font-mono border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-400"></textarea>
                    <button onclick="decryptMessage()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition">揭開身分</button>
                </div>
                <div id="result-display" class="hidden text-center p-6 rounded-xl border-2 border-dashed">
                    <div id="result-text" class="text-3xl font-black"></div>
                </div>
            </section>
        </div>

        <!-- Host Tab -->
        <div id="tab-host" class="p-8 hidden-tab space-y-6">
            <h2 class="text-xl font-bold text-gray-800">主持人工具區</h2>
            <p class="text-sm text-gray-600">貼上所有人的公鑰，系統會隨機抽出一名兇手並生成每個人專屬的加密文字。</p>
            
            <div id="host-inputs" class="space-y-3">
                <div class="flex space-x-2 player-input-row">
                    <input placeholder="玩家姓名" class="flex-none w-24 border rounded-lg px-3 py-2 text-sm">
                    <input placeholder="貼上該玩家的公鑰" class="flex-1 border rounded-lg px-3 py-2 text-sm font-mono">
                </div>
            </div>
            
            <div class="flex space-x-2">
                <button onclick="addPlayerRow()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 rounded-lg">+ 增加玩家</button>
                <button onclick="generateGame()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg shadow-md">決定兇手並加密</button>
            </div>

            <div id="host-result" class="hidden space-y-4">
                <label class="text-sm font-bold text-gray-700">加密結果 (直接整段複製到群組)：</label>
                <div class="relative">
                    <textarea id="host-output" readonly class="w-full h-64 text-xs font-mono bg-gray-900 text-green-400 rounded-lg p-4"></textarea>
                    <button onclick="copy('host-output')" class="absolute top-2 right-2 bg-gray-700 text-white px-2 py-1 text-xs rounded hover:bg-gray-600">複製整段</button>
                </div>
            </div>
        </div>
    </div>

    <p class="mt-8 text-gray-400 text-xs">Made with ❤️ by 土豆妹 for 土豆小姐</p>

    <script>
        // Tab switching
        function showTab(tab) {
            const isPlayer = tab === 'player';
            document.getElementById('tab-player').classList.toggle('hidden-tab', !isPlayer);
            document.getElementById('tab-host').classList.toggle('hidden-tab', isPlayer);
            document.getElementById('btn-player').className = isPlayer ? 'flex-1 py-4 font-medium tab-active' : 'flex-1 py-4 font-medium text-gray-500 hover:text-blue-500';
            document.getElementById('btn-host').className = !isPlayer ? 'flex-1 py-4 font-medium tab-active' : 'flex-1 py-4 font-medium text-gray-500 hover:text-blue-500';
        }

        // Key Utils
        async function generateKeys() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert('請先輸入名字！');

            const keyPair = await window.crypto.subtle.generateKey(
                {
                    name: "RSA-OAEP",
                    modulusLength: 2048,
                    publicExponent: new Uint8Array([1, 0, 1]),
                    hash: "SHA-256",
                },
                true,
                ["encrypt", "decrypt"]
            );

            const pubJwk = await window.crypto.subtle.exportKey("jwk", keyPair.publicKey);
            const privJwk = await window.crypto.subtle.exportKey("jwk", keyPair.privateKey);

            // Simple serialization: Base64 of JSON
            document.getElementById('pub-key').value = btoa(JSON.stringify({ n: name, k: pubJwk }));
            document.getElementById('priv-key').value = btoa(JSON.stringify(privJwk));
            document.getElementById('key-display').classList.remove('hidden');
        }

        async function decryptMessage() {
            try {
                const privRaw = document.getElementById('input-priv-key').value.trim();
                const cipherRaw = document.getElementById('encrypted-msg').value.trim();
                if (!privRaw || !cipherRaw) return alert('請輸入私鑰和加密訊息！');

                const privJwk = JSON.parse(atob(privRaw));
                const cipherBytes = new Uint8Array(atob(cipherRaw).split("").map(c => c.charCodeAt(0)));

                const privKey = await window.crypto.subtle.importKey(
                    "jwk",
                    privJwk,
                    { name: "RSA-OAEP", hash: "SHA-256" },
                    false,
                    ["decrypt"]
                );

                const decrypted = await window.crypto.subtle.decrypt(
                    { name: "RSA-OAEP" },
                    privKey,
                    cipherBytes
                );

                const text = new TextDecoder().decode(decrypted);
                const display = document.getElementById('result-display');
                const textEl = document.getElementById('result-text');
                
                display.classList.remove('hidden');
                textEl.innerText = text;
                
                if (text.includes('兇手')) {
                    display.className = "text-center p-6 rounded-xl border-2 border-dashed border-red-500 bg-red-50 text-red-600";
                } else {
                    display.className = "text-center p-6 rounded-xl border-2 border-dashed border-green-500 bg-green-50 text-green-600";
                }
            } catch (e) {
                console.error(e);
                alert('解密失敗，請檢查私鑰或加密訊息是否正確！');
            }
        }

        // Host logic
        function addPlayerRow() {
            const container = document.getElementById('host-inputs');
            const div = document.createElement('div');
            div.className = "flex space-x-2 player-input-row";
            div.innerHTML = `
                <input placeholder="玩家姓名" class="flex-none w-24 border rounded-lg px-3 py-2 text-sm">
                <input placeholder="貼上該玩家的公鑰" class="flex-1 border rounded-lg px-3 py-2 text-sm font-mono">
            `;
            container.appendChild(div);
        }

        async function generateGame() {
            const rows = document.querySelectorAll('.player-input-row');
            const players = [];
            for (let row of rows) {
                const inputs = row.querySelectorAll('input');
                const name = inputs[0].value.trim();
                const pubRaw = inputs[1].value.trim();
                if (name && pubRaw) {
                    players.push({ name, pubRaw });
                }
            }

            if (players.length < 2) return alert('至少需要兩位玩家！');

            // Randomly pick one killer
            const killerIndex = Math.floor(Math.random() * players.length);
            let output = "🎭 怕屁加密身分名單 🎭\n請複製自己的代碼到工具解密：\n\n";

            for (let i = 0; i < players.length; i++) {
                const isKiller = i === killerIndex;
                const message = isKiller ? "你是兇手 😈" : "你是無辜 😇";
                
                try {
                    const pubData = JSON.parse(atob(players[i].pubRaw));
                    const pubKey = await window.crypto.subtle.importKey(
                        "jwk",
                        pubData.k,
                        { name: "RSA-OAEP", hash: "SHA-256" },
                        false,
                        ["encrypt"]
                    );

                    const encrypted = await window.crypto.subtle.encrypt(
                        { name: "RSA-OAEP" },
                        pubKey,
                        new TextEncoder().encode(message)
                    );

                    const cipherBase64 = btoa(String.fromCharCode(...new Uint8Array(encrypted)));
                    output += `${players[i].name}：\n${cipherBase64}\n\n`;
                } catch (e) {
                    console.error(e);
                    alert(`加密玩家 ${players[i].name} 時發生錯誤，請檢查公鑰！`);
                    return;
                }
            }

            document.getElementById('host-output').value = output;
            document.getElementById('host-result').classList.remove('hidden');
        }

        function copy(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '已複製!';
            setTimeout(() => btn.innerText = originalText, 2000);
        }
    </script>
</body>
</html>
