<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papi Key Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #f4f4f4;
            color: #333;
        }
        .container-box {
            max-width: 600px;
            width: 100%;
            background: white;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px #000;
        }
        input, textarea {
            border: 2px solid #000 !important;
            border-radius: 0 !important;
            font-family: 'JetBrains+Mono', monospace;
        }
        button {
            border: 2px solid #000 !important;
            border-radius: 0 !important;
            background: #fff;
            transition: all 0.1s;
            font-weight: bold;
        }
        button:hover {
            background: #000;
            color: #fff;
            transform: translate(-2px, -2px);
            box-shadow: 2px 2px 0px #555;
        }
        button:active {
            transform: translate(0, 0);
            box-shadow: none;
        }
        .header {
            border-bottom: 2px solid #000;
            padding: 20px;
            background: #eee;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div class="container-box">
        <div class="header">
            <h1 class="text-xl font-bold">Papi Key Tool</h1>
            <p class="text-sm mt-1">Asymmetric Encryption for Game Identity</p>
        </div>

        <div class="p-6 space-y-10">
            <!-- Step 1: Generate -->
            <section class="space-y-4">
                <h2 class="text-lg font-bold underline">STEP 1: GENERATE KEYS</h2>
                <div class="flex flex-col space-y-2">
                    <input id="player-name" type="text" placeholder="Enter your name" class="px-4 py-2 outline-none">
                    <button onclick="generateKeys()" class="py-2">GENERATE</button>
                </div>
                
                <div id="key-display" class="hidden space-y-4 pt-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold uppercase text-gray-500">Public Key (Paste to group)</label>
                        <textarea id="pub-key" readonly class="w-full h-24 text-xs bg-gray-50 p-2"></textarea>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold uppercase text-red-500 underline">Private Key (KEEP IT SECRET!)</label>
                        <textarea id="priv-key" readonly class="w-full h-24 text-xs bg-red-50 p-2"></textarea>
                    </div>
                </div>
            </section>

            <div class="border-t-2 border-dashed border-gray-300"></div>

            <!-- Step 2: Decrypt -->
            <section class="space-y-4">
                <h2 class="text-lg font-bold underline">STEP 2: DECRYPT IDENTITY</h2>
                <div class="space-y-3">
                    <textarea id="input-priv-key" placeholder="Paste your Private Key" class="w-full h-20 text-xs p-2 outline-none"></textarea>
                    <textarea id="encrypted-msg" placeholder="Paste the encrypted message from Host" class="w-full h-20 text-xs p-2 outline-none"></textarea>
                    <button onclick="decryptMessage()" class="w-full py-3 bg-gray-100">REVEAL IDENTITY</button>
                </div>
                
                <div id="result-display" class="hidden text-center p-6 border-4 border-double border-black bg-yellow-50">
                    <div id="result-text" class="text-2xl font-bold italic"></div>
                </div>
            </section>
        </div>
    </div>

    <p class="mt-8 text-gray-500 text-xs font-mono">twodough/papi-key-tool</p>

    <script>
        // UTF-8 safe btoa/atob
        function utob(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }
        function btou(str) {
            return decodeURIComponent(escape(atob(str)));
        }

        async function generateKeys() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert('Name required!');

            const keyPair = await window.crypto.subtle.generateKey(
                {
                    name: "RSA-OAEP",
                    modulusLength: 2048,
                    publicExponent: new Uint8Array([1, 0, 1]),
                    hash: "SHA-256",
                },
                true,
                ["encrypt", "decrypt"]
            );

            const pubJwk = await window.crypto.subtle.exportKey("jwk", keyPair.publicKey);
            const privJwk = await window.crypto.subtle.exportKey("jwk", keyPair.privateKey);

            document.getElementById('pub-key').value = utob(JSON.stringify({ n: name, k: pubJwk }));
            document.getElementById('priv-key').value = utob(JSON.stringify(privJwk));
            document.getElementById('key-display').classList.remove('hidden');
        }

        async function decryptMessage() {
            try {
                const privRaw = document.getElementById('input-priv-key').value.trim();
                const cipherRaw = document.getElementById('encrypted-msg').value.trim();
                if (!privRaw || !cipherRaw) return alert('Missing keys or message!');

                const privJwk = JSON.parse(btou(privRaw));
                const cipherBytes = new Uint8Array(atob(cipherRaw).split("").map(c => c.charCodeAt(0)));

                const privKey = await window.crypto.subtle.importKey(
                    "jwk",
                    privJwk,
                    { name: "RSA-OAEP", hash: "SHA-256" },
                    false,
                    ["decrypt"]
                );

                const decrypted = await window.crypto.subtle.decrypt(
                    { name: "RSA-OAEP" },
                    privKey,
                    cipherBytes
                );

                const text = new TextDecoder().decode(decrypted);
                const display = document.getElementById('result-display');
                const textEl = document.getElementById('result-text');
                
                display.classList.remove('hidden');
                textEl.innerText = text;
            } catch (e) {
                console.error(e);
                alert('Decryption failed! Please check your keys.');
            }
        }
    </script>
</body>
</html>
