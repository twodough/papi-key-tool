<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papi Key Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #f4f4f4;
            color: #333;
        }
        .container-box {
            max-width: 600px;
            width: 100%;
            background: white;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px #000;
        }
        textarea {
            border: 2px solid #000 !important;
            border-radius: 0 !important;
            font-family: 'JetBrains+Mono', monospace;
            width: 100%;
            background: #fff;
            padding: 0.5rem;
            font-size: 0.75rem;
        }
        button {
            border: 2px solid #000 !important;
            border-radius: 0 !important;
            background: #fff;
            transition: all 0.1s;
            font-weight: bold;
            padding: 0.75rem;
        }
        button:hover {
            background: #000;
            color: #fff;
            transform: translate(-2px, -2px);
            box-shadow: 2px 2px 0px #555;
        }
        button:active {
            transform: translate(0, 0);
            box-shadow: none;
        }
        .header {
            border-bottom: 2px solid #000;
            padding: 20px;
            background: #eee;
        }
        .section-title {
            font-weight: bold;
            text-decoration: underline;
            margin-bottom: 1rem;
            display: block;
        }
        .key-label {
            font-size: 0.7rem;
            font-weight: bold;
            display: block;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div class="container-box">
        <div class="header">
            <h1 class="text-xl font-bold text-center">PAPI 遊戲金鑰工具</h1>
        </div>

        <div class="p-6 space-y-10">
            <!-- STEP 1 -->
            <section>
                <span class="section-title">STEP 1: 產生金鑰</span>
                <button onclick="generateKeys()" class="w-full">點我產生新金鑰</button>
                
                <div id="key-display" class="hidden mt-6 space-y-4">
                    <div class="space-y-2">
                        <label class="key-label">公鑰 (發送到群組)</label>
                        <div class="flex gap-2">
                            <textarea id="pub-key" readonly rows="2" class="flex-1"></textarea>
                            <button onclick="copy('pub-key')" class="whitespace-nowrap px-4 bg-white hover:bg-black hover:text-white border-2 border-black transition-colors font-bold text-sm">複製</button>
                        </div>
                    </div>
                    <div class="p-4 bg-red-50 border-2 border-dashed border-red-200">
                        <label class="key-label text-red-600">私鑰 (已自動暫存，請勿重新整理網頁)</label>
                        <p class="text-[10px] text-red-400 mb-2">※ 若需備份，可手動複製：</p>
                        <textarea id="priv-key-display" readonly rows="2" class="bg-white opacity-50 text-[10px]"></textarea>
                    </div>
                </div>
            </section>

            <div class="border-t-2 border-dashed border-gray-300"></div>

            <!-- STEP 2 -->
            <section>
                <span class="section-title">STEP 2: 解密身分</span>
                <div class="space-y-4">
                    <textarea id="encrypted-msg" placeholder="在此貼上主持人的加密訊息..." rows="3"></textarea>
                    <button onclick="decryptMessage()" class="w-full">揭開我的秘密身分</button>
                </div>
                
                <div id="result-display" class="hidden mt-6 text-center p-6 border-4 border-double border-black bg-yellow-50">
                    <div id="result-text" class="text-2xl font-bold italic"></div>
                </div>
            </section>
        </div>
    </div>

    <p class="mt-8 text-gray-500 text-xs font-mono">twodough/papi-key-tool</p>

    <script>
        let cachedPrivKey = null;

        async function generateKeys() {
            const keyPair = await window.crypto.subtle.generateKey(
                {
                    name: "RSA-OAEP",
                    modulusLength: 1024, // 512 is too small for SHA-256 padding, 1024 is the minimum viable
                    publicExponent: new Uint8Array([1, 0, 1]),
                    hash: "SHA-256",
                },
                true,
                ["encrypt", "decrypt"]
            );

            const pubJwk = await window.crypto.subtle.exportKey("jwk", keyPair.publicKey);
            const privJwk = await window.crypto.subtle.exportKey("jwk", keyPair.privateKey);

            const pubShort = { n: pubJwk.n, e: pubJwk.e };
            const privShort = { 
                n: privJwk.n, e: privJwk.e, d: privJwk.d, 
                p: privJwk.p, q: privJwk.q, dp: privJwk.dp, 
                dq: privJwk.dq, qi: privJwk.qi 
            };

            const pubKeyStr = btoa(JSON.stringify(pubShort));
            const privKeyStr = btoa(JSON.stringify(privShort));

            document.getElementById('pub-key').value = pubKeyStr;
            document.getElementById('priv-key-display').value = privKeyStr;
            cachedPrivKey = privKeyStr;
            
            document.getElementById('key-display').classList.remove('hidden');
        }

        async function decryptMessage() {
            try {
                const cipherRaw = document.getElementById('encrypted-msg').value.trim();
                if (!cipherRaw) return alert('請先貼上加密訊息');
                if (!cachedPrivKey) return alert('請先執行 STEP 1 產生金鑰');

                const privData = JSON.parse(atob(cachedPrivKey));
                const privJwk = {
                    ...privData,
                    kty: "RSA",
                    alg: "RSA-OAEP-256",
                    ext: true,
                    key_ops: ["decrypt"]
                };

                const cipherBytes = new Uint8Array(atob(cipherRaw).split("").map(c => c.charCodeAt(0)));

                const privKey = await window.crypto.subtle.importKey(
                    "jwk",
                    privJwk,
                    { name: "RSA-OAEP", hash: "SHA-256" },
                    false,
                    ["decrypt"]
                );

                const decrypted = await window.crypto.subtle.decrypt(
                    { name: "RSA-OAEP" },
                    privKey,
                    cipherBytes
                );

                const text = new TextDecoder().decode(decrypted);
                const display = document.getElementById('result-display');
                const textEl = document.getElementById('result-text');
                
                display.classList.remove('hidden');
                textEl.innerText = text;
            } catch (e) {
                console.error(e);
                alert('解密失敗，請確認加密訊息是否正確');
            }
        }
        function copy(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
            const btn = event.currentTarget;
            const originalText = btn.innerText;
            btn.innerText = '已複製!';
            setTimeout(() => btn.innerText = originalText, 2000);
        }
    </script>
</body>
</html>
